<svg xmlns="http://www.w3.org/2000/svg" width="2300" height="1120" viewBox="0 0 2300 1120" role="img" aria-labelledby="title desc">
  <title id="title">双流训练与联合损失框架</title>
  <desc id="desc">自然分布主流训练完整轨迹任务，小类均衡辅助流仅训练意图任务，训练专用未来教师和候选监督共同汇入联合损失。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowTrain" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#7556A8"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #20262E; letter-spacing: 0; }
      .figure-title { font-size: 34px; font-weight: 500; }
      .group-title { font-size: 23px; font-weight: 500; }
      .box-title { font-size: 21px; font-weight: 500; }
      .body { font-size: 17px; font-weight: 400; }
      .small { font-size: 15px; font-weight: 400; fill: #5C6672; }
      .formula { font-size: 19px; font-weight: 500; }
      .step { font-size: 17px; font-weight: 500; }
    </style>
  </defs>
  <rect x="0" y="0" width="2300" height="1120" fill="#FFFFFF"/>
  <text x="1150" y="52" text-anchor="middle" class="figure-title">双流训练与联合损失框架</text>
<rect x="750" y="72" width="22" height="15" rx="2" fill="#EAF2FB" stroke="#4A79A8" stroke-width="1.5"/><text x="781" y="85" text-anchor="start" class="small"><tspan x="781" dy="0">原始主干</tspan></text>
<rect x="895" y="72" width="22" height="15" rx="2" fill="#ECF5EF" stroke="#3D7D55" stroke-width="1.5"/><text x="926" y="85" text-anchor="start" class="small"><tspan x="926" dy="0">本文新增</tspan></text>
<rect x="1040" y="72" width="22" height="15" rx="2" fill="#FFF7E6" stroke="#9B6A20" stroke-width="1.5"/><text x="1071" y="85" text-anchor="start" class="small"><tspan x="1071" dy="0">语义/几何先验</tspan></text>
<rect x="1210" y="72" width="22" height="15" rx="2" fill="#F4F0FA" stroke="#7556A8" stroke-width="1.5" stroke-dasharray="4 3"/><text x="1241" y="85" text-anchor="start" class="small"><tspan x="1241" dy="0">仅训练阶段</tspan></text>
<rect x="45" y="155" width="1520" height="750" rx="6" fill="#FFFFFF" stroke="#65707C" stroke-width="2.2"/>
  <rect x="61" y="138" width="203" height="34" rx="4" fill="#FFFFFF" stroke="#65707C" stroke-width="1.8"/>
  <text x="162.5" y="162" text-anchor="middle" class="group-title">并行训练数据流</text>
<rect x="80" y="235" width="260" height="155" rx="5" fill="#F7F8FA" stroke="#65707C" stroke-width="2"/><text x="210" y="270" text-anchor="middle" class="box-title"><tspan x="210" dy="0">固定训练窗口</tspan></text>
<text x="210" y="303" text-anchor="middle" class="body"><tspan x="210" dy="0">按船舶唯一识别码 MMSI</tspan><tspan x="210" dy="24">固定划分训练/验证/测试</tspan><tspan x="210" dy="24">3 小时历史 → 3 小时未来</tspan><tspan x="210" dy="24">保持自然类别分布</tspan></text>
<rect x="430" y="235" width="340" height="155" rx="5" fill="#EAF2FB" stroke="#4A79A8" stroke-width="2"/><text x="600" y="270" text-anchor="middle" class="box-title"><tspan x="600" dy="0">自然分布主训练流</tspan></text>
<text x="600" y="303" text-anchor="middle" class="body"><tspan x="600" dy="0">完整 iTentformer 前向</tspan><tspan x="600" dy="26">意图 + 解码 + 候选</tspan><tspan x="600" dy="26">保护总体平均/终点位移误差</tspan></text>
<rect x="860" y="215" width="650" height="195" rx="5" fill="#EAF2FB" stroke="#4A79A8" stroke-width="2"/><text x="1185" y="250" text-anchor="middle" class="box-title"><tspan x="1185" dy="0">完整轨迹目标 Ltraj</tspan></text>
<text x="1185" y="283" text-anchor="middle" class="body"><tspan x="1185" dy="0">自动加权：意图均方误差 + 轨迹均方误差</tspan><tspan x="1185" dy="31">+ 球面地理距离 + 终点位移误差 FDE</tspan><tspan x="1185" dy="31">+ 轨迹平滑损失 + 环形航向 COG 损失</tspan></text>
<polyline points="340,312 430,312" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#arrow)"/><polyline points="770,312 860,312" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#arrow)"/><rect x="80" y="580" width="260" height="155" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="210" y="615" text-anchor="middle" class="box-title"><tspan x="210" dy="0">轨迹级均衡采样</tspan></text>
<text x="210" y="648" text-anchor="middle" class="body"><tspan x="210" dy="0">逆频次温和加权</tspan><tspan x="210" dy="26">20% 额外编码</tspan><tspan x="210" dy="26">避免长轨迹窗口霸占</tspan></text>
<rect x="430" y="580" width="340" height="155" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="600" y="615" text-anchor="middle" class="box-title"><tspan x="600" dy="0">小类意图辅助流</tspan></text>
<text x="600" y="648" text-anchor="middle" class="body"><tspan x="600" dy="0">仅意图模式前向</tspan><tspan x="600" dy="26">不运行轨迹解码器</tspan><tspan x="600" dy="26">不替换自然分布窗口</tspan></text>
<rect x="860" y="560" width="650" height="195" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="1185" y="595" text-anchor="middle" class="box-title"><tspan x="1185" dy="0">意图目标 Lintent</tspan></text>
<text x="1185" y="628" text-anchor="middle" class="body"><tspan x="1185" dy="0">主航路交叉熵 + 子航路难样本聚焦损失</tspan><tspan x="1185" dy="31">+ 类别权重 + 分阶段软标签</tspan><tspan x="1185" dy="31">+ 可判别性二元交叉熵 + 对比损失</tspan></text>
<polyline points="340,657 430,657" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#arrow)"/><polyline points="770,657 860,657" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#arrow)"/><rect x="1625" y="155" width="630" height="750" rx="6" fill="#FFFFFF" stroke="#7556A8" stroke-width="2.2" stroke-dasharray="10 7"/>
  <rect x="1641" y="138" width="230" height="34" rx="4" fill="#FFFFFF" stroke="#7556A8" stroke-width="1.8" stroke-dasharray="10 7"/>
  <text x="1756" y="162" text-anchor="middle" class="group-title">训练专用监督</text>
<rect x="1670" y="225" width="540" height="180" rx="5" fill="#F4F0FA" stroke="#7556A8" stroke-width="2" stroke-dasharray="8 6"/><text x="1940" y="260" text-anchor="middle" class="box-title"><tspan x="1940" dy="0">未来增强意图教师</tspan></text>
<text x="1940" y="293" text-anchor="middle" class="body"><tspan x="1940" dy="0">真实未来相对位移 → 未来运动编码器</tspan><tspan x="1940" dy="26">形成子航路未来模式原型</tspan><tspan x="1940" dy="26">仅可判别历史参与对齐</tspan><tspan x="1940" dy="26">推理阶段完全移除</tspan></text>
<rect x="1670" y="535" width="540" height="180" rx="5" fill="#F4F0FA" stroke="#7556A8" stroke-width="2" stroke-dasharray="8 6"/><text x="1940" y="570" text-anchor="middle" class="box-title"><tspan x="1940" dy="0">候选优胜者监督</tspan></text>
<text x="1940" y="603" text-anchor="middle" class="body"><tspan x="1940" dy="0">候选轨迹与真实未来比较</tspan><tspan x="1940" dy="26">候选代价 = 平均误差 ADE + 0.2·终点误差 FDE</tspan><tspan x="1940" dy="26">软排序损失 + 代价回归损失</tspan><tspan x="1940" dy="26">推理改用学习式选择器</tspan></text>
<rect x="500" y="990" width="1300" height="85" rx="6" fill="#FFFFFF" stroke="#3D7D55" stroke-width="2.2"/>
  <rect x="516" y="973" width="160" height="34" rx="4" fill="#FFFFFF" stroke="#3D7D55" stroke-width="1.8"/>
  <text x="596" y="997" text-anchor="middle" class="group-title">联合优化</text>
<text x="1150" y="1036" text-anchor="middle" class="formula"><tspan x="1150" dy="0">L = Ltraj + Lintent + λfuture·Lfuture + λselector·Lselector + λcandidate·Lcandidate</tspan></text>
<polyline points="1510,312 1535,312 1535,940" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round"/><polyline points="1510,657 1535,657" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round"/><polyline points="2210,315 2230,315 2230,940" fill="none" stroke="#7556A8" stroke-width="2.3" stroke-linejoin="round" stroke-dasharray="8 6"/><polyline points="2210,625 2230,625" fill="none" stroke="#7556A8" stroke-width="2.3" stroke-linejoin="round" stroke-dasharray="8 6"/><polyline points="1150,940 2230,940" fill="none" stroke="#4B5563" stroke-width="2.3" stroke-linejoin="round"/><rect x="1531" y="936" width="8" height="8" fill="#3D7D55"/><rect x="2226" y="936" width="8" height="8" fill="#7556A8"/><polyline points="1150,940 1150,990" fill="none" stroke="#3D7D55" stroke-width="2.3" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="2250" y="1055" text-anchor="end" class="small"><tspan x="2250" dy="0">验证集：平均误差 ADE + 0.2·终点误差 FDE</tspan><tspan x="2250" dy="23">早停耐心值 = 10</tspan></text>
</svg>
