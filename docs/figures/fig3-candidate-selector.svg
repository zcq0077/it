<rect x="885" y="72" width="22" height="15" rx="2" fill="#ECF5EF" stroke="#3D7D55" stroke-width="1.5"/><text x="916" y="85" text-anchor="start" class="small"><tspan x="916" dy="0">本文新增</tspan></text>
<rect x="1030" y="72" width="22" height="15" rx="2" fill="#FFF7E6" stroke="#9B6A20" stroke-width="1.5"/><text x="1061" y="85" text-anchor="start" class="small"><tspan x="1061" dy="0">语义/几何先验</tspan></text>
