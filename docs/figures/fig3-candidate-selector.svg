<svg xmlns="http://www.w3.org/2000/svg" width="2280" height="1110" viewBox="0 0 2280 1110" role="img" aria-labelledby="title desc">
  <title id="title">多候选轨迹生成与学习式筛选模块</title>
  <desc id="desc">基础预测与六条子航路条件预测组成候选集合，候选选择器使用历史、航路概率和几何合理性选出唯一轨迹。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowTrain" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#7556A8"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif; fill: #20262E; letter-spacing: 0; }
      .figure-title { font-size: 34px; font-weight: 500; }
      .group-title { font-size: 23px; font-weight: 500; }
      .box-title { font-size: 21px; font-weight: 500; }
      .body { font-size: 17px; font-weight: 400; }
      .small { font-size: 15px; font-weight: 400; fill: #5C6672; }
      .formula { font-size: 19px; font-weight: 500; }
      .step { font-size: 17px; font-weight: 500; }
    </style>
  </defs>
