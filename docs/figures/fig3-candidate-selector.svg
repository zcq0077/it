<rect x="55" y="235" width="280" height="175" rx="5" fill="#EAF2FB" stroke="#4A79A8" stroke-width="2"/><text x="195" y="270" text-anchor="middle" class="box-title"><tspan x="195" dy="0">历史编码 H</tspan></text>
<text x="195" y="303" text-anchor="middle" class="body"><tspan x="195" dy="0">TCN 局部时序编码</tspan><tspan x="195" dy="24">+ Transformer 全局编码</tspan><tspan x="195" dy="24">千问语义已经门控融合</tspan><tspan x="195" dy="24">主/子航路分类得分</tspan></text>
<rect x="55" y="520" width="280" height="175" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="195" y="555" text-anchor="middle" class="box-title"><tspan x="195" dy="0">候选标签集合</tspan></text>
<text x="195" y="588" text-anchor="middle" class="body"><tspan x="195" dy="0">基础轨迹</tspan><tspan x="195" dy="26">OA_S00 / S01 / S02</tspan><tspan x="195" dy="26">OB1_S00 / OB2_S00 / OC_S00</tspan></text>
