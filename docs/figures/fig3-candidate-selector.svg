<text x="2125" y="383" text-anchor="middle" class="body"><tspan x="2125" dy="0">候选概率归一化</tspan><tspan x="2125" dy="31">置信度阈值</tspan><tspan x="2125" dy="31">前两候选得分间隔</tspan><tspan x="2125" dy="31">验证集校准</tspan><tspan x="2125" dy="31">控制是否切换分支</tspan></text>
