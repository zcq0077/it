<rect x="990" y="595" width="410" height="55" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="1195" y="624" text-anchor="middle" class="box-title"><tspan x="1195" dy="0">Ŷ5  OB2-S00</tspan></text>
<rect x="990" y="673" width="410" height="55" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="1195" y="702" text-anchor="middle" class="box-title"><tspan x="1195" dy="0">Ŷ6  OC-S00</tspan></text>
