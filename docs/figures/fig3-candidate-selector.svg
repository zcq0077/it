<text x="640" y="488" text-anchor="middle" class="body"><tspan x="640" dy="0">Transformer + 注意力融合</tspan><tspan x="640" dy="26">线性运动基线 + 共享残差</tspan></text>
<rect x="450" y="620" width="380" height="125" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="640" y="655" text-anchor="middle" class="box-title"><tspan x="640" dy="0">分支残差修正</tspan></text>
<text x="640" y="688" text-anchor="middle" class="body"><tspan x="640" dy="0">第 k 个专家残差，缩放系数 = 0.25</tspan></text>
