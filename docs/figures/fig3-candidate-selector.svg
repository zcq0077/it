  <text x="1606" y="162" text-anchor="middle" class="group-title">候选评分</text>
<rect x="1555" y="220" width="350" height="230" rx="5" fill="#FFF7E6" stroke="#9B6A20" stroke-width="2"/><text x="1730" y="255" text-anchor="middle" class="box-title"><tspan x="1730" dy="0">六维几何与概率特征</tspan></text>
<text x="1730" y="288" text-anchor="middle" class="body"><tspan x="1730" dy="0">第 k 个主航路的对数概率</tspan><tspan x="1730" dy="31">第 k 个子航路的对数概率</tspan><tspan x="1730" dy="31">连续性 / 平滑性</tspan><tspan x="1730" dy="31">原型距离 / 基础候选标记</tspan></text>
<rect x="1555" y="535" width="350" height="180" rx="5" fill="#ECF5EF" stroke="#3D7D55" stroke-width="2"/><text x="1730" y="570" text-anchor="middle" class="box-title"><tspan x="1730" dy="0">候选轨迹选择器</tspan></text>
<text x="1730" y="603" text-anchor="middle" class="body"><tspan x="1730" dy="0">历史 H、航路嵌入、六维评分特征</tspan><tspan x="1730" dy="26">层归一化 → MLP → 第 k 个候选得分</tspan><tspan x="1730" dy="26">+ 航路概率先验</tspan></text>
